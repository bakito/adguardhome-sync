name: docker-images

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless signing via GitHub OIDC
    strategy:
      matrix:
        build:
          - fromImage: scratch
            tagPrefix: ""
          - fromImage: alpine:latest
            tagPrefix: "alpine-"
    steps:
      - name: Get current date
        run: echo "curr_date=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for commits in the last 24 hours
        run: echo "NEW_COMMIT_COUNT=$(git log --oneline --since '24 hours ago' | wc -l)" >> $GITHUB_ENV
        if: ${{ github.event.release.tag_name == '' }}

      - name: Login to Quay
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ github.event.release.tag_name != '' || (github.ref == 'refs/heads/main' && env.NEW_COMMIT_COUNT > 0) }}
        with:
          registry: quay.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ github.event.release.tag_name != '' || (github.ref == 'refs/heads/main' && env.NEW_COMMIT_COUNT > 0) }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Modify Dockerfile
        run: |
          sed -i -e "s|FROM scratch|FROM ${{ matrix.build.fromImage }}|g" Dockerfile

      - name: Build release images ${{ github.event.release.tag_name }}
        id: docker_build_release
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ github.event.release.tag_name != '' }}
        with:
          context: .
          pull: true
          push: true
          tags: quay.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}latest,quay.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}${{ github.event.release.tag_name }},ghcr.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}latest,ghcr.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}${{ github.event.release.tag_name }}
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/arm64,linux/ppc64le
          provenance: false
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            BUILD=${{ env.curr_date }}

      - name: Sign release images
        if: ${{ github.event.release.tag_name != '' }}
        env:
          DIGEST: ${{ steps.docker_build_release.outputs.digest }}
        run: |
          for IMAGE in \
            quay.io/bakito/adguardhome-sync \
            ghcr.io/bakito/adguardhome-sync; do
            cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
          done

      - name: Build images
        id: docker_build_main
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ github.event.release.tag_name == '' && env.NEW_COMMIT_COUNT > 0 }}
        with:
          context: .
          pull: true
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: quay.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}main,ghcr.io/bakito/adguardhome-sync:${{ matrix.build.tagPrefix }}main
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/arm64,linux/ppc64le
          provenance: false
          build-args: |
            VERSION=main
            BUILD=${{ env.curr_date }}

      - name: Sign main images
        if: ${{ github.event.release.tag_name == '' && env.NEW_COMMIT_COUNT > 0 && github.ref == 'refs/heads/main' }}
        env:
          DIGEST: ${{ steps.docker_build_main.outputs.digest }}
        run: |
          for IMAGE in \
            quay.io/bakito/adguardhome-sync \
            ghcr.io/bakito/adguardhome-sync; do
            cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
          done

      - name: Image digest
        run: echo ${{ steps.docker_build_release.outputs.digest }}${{ steps.docker_build_main.outputs.digest }}
