# managed by https://github.com/bakito/github-files sync action
name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule: # daily at 03:33 UTC
    - cron: "33 03 * * *"
  workflow_dispatch:

permissions:
  contents: read
jobs:
  govulncheck:
    name: Check Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run code generation if available
        run: |
          if make -n generate > /dev/null 2>&1; then
            make generate
          fi

      - name: Check vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -show verbose,color ./...
