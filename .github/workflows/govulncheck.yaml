# managed by https://github.com/bakito/github-files sync action
name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule: # daily at 03:33 UTC
    - cron: "33 03 * * *"
  workflow_dispatch:

permissions:
  contents: read
jobs:
  govulncheck:
    name: Check Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run code generation if available
        run: |
          if make -n generate > /dev/null 2>&1; then
            make generate
          fi

      - name: Check vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -show verbose,color ./...
